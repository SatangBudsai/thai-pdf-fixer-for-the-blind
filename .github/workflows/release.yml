name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-python-sidecar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements.txt
          pip install pyinstaller

      - name: Build converter sidecar
        run: |
          cd python
          pyinstaller converter.spec

      - name: Copy sidecar to Tauri binaries
        run: |
          copy python\dist\converter.exe src-tauri\binaries\converter-x86_64-pc-windows-msvc.exe

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-windows
          path: src-tauri/binaries/converter-x86_64-pc-windows-msvc.exe

  build-tauri:
    needs: build-python-sidecar
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-windows
          path: src-tauri/binaries/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Thai PDF Fixer ${{ github.ref_name }}'
          releaseBody: |
            ดาวน์โหลดตัวติดตั้ง:
            - `.exe` — ตัวติดตั้งแบบ NSIS (แนะนำ)
            - `.msi` — ตัวติดตั้งแบบ Windows Installer

            หากใช้งานอยู่แล้ว แอปจะแจ้งเตือนอัปเดตอัตโนมัติ
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
