name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-python-sidecar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements.txt
          pip install pyinstaller
          pip install --force-reinstall --no-binary charset-normalizer charset-normalizer

      - name: Build converter sidecar
        working-directory: python
        run: pyinstaller converter.spec

      - name: Copy sidecar to Tauri binaries
        run: |
          copy python\dist\converter.exe src-tauri\binaries\converter-x86_64-pc-windows-msvc.exe

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-windows
          path: src-tauri/binaries/converter-x86_64-pc-windows-msvc.exe

  build-tauri:
    needs: build-python-sidecar
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-windows
          path: src-tauri/binaries/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify signing key is set
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is NOT set!"
            exit 1
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY})"
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not set"
          else
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set (length: ${#TAURI_SIGNING_PRIVATE_KEY_PASSWORD})"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: List build output
        shell: bash
        run: |
          echo "=== NSIS output ==="
          ls -la src-tauri/target/release/bundle/nsis/ || echo "No NSIS output"
          echo "=== Looking for .sig files ==="
          find src-tauri/target/release/bundle -name "*.sig" 2>/dev/null || echo "No .sig files found"

      - name: Create release and upload assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Find the setup exe and sig
          SETUP_EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
          SETUP_SIG=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe.sig" | head -1)

          echo "Setup exe: $SETUP_EXE"
          echo "Setup sig: $SETUP_SIG"

          # Create release
          gh release create "$TAG" \
            --title "Thai PDF Fixer $TAG" \
            --notes "$(cat <<'NOTES'
          ดาวน์โหลดตัวติดตั้ง:
          - \`.exe\` — ตัวติดตั้งแบบ NSIS

          หากใช้งานอยู่แล้ว แอปจะแจ้งเตือนอัปเดตอัตโนมัติ
          NOTES
          )" \
            || echo "Release may already exist, uploading assets..."

          # Upload assets
          if [ -n "$SETUP_EXE" ]; then
            gh release upload "$TAG" "$SETUP_EXE" --clobber
          fi
          if [ -n "$SETUP_SIG" ]; then
            gh release upload "$TAG" "$SETUP_SIG" --clobber
          fi

      - name: Generate and upload latest.json
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          SETUP_EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" -printf "%f" | head -1)
          SETUP_SIG=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe.sig" | head -1)

          if [ -z "$SETUP_SIG" ]; then
            echo "::error::No .sig file found! Cannot create latest.json"
            exit 1
          fi

          SIGNATURE=$(cat "$SETUP_SIG")
          DOWNLOAD_URL="https://github.com/SatangBudsai/thai-pdf-fixer-for-the-blind/releases/download/${TAG}/${SETUP_EXE}"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Thai PDF Fixer ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --clobber
