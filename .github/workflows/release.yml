name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-python-sidecar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements.txt
          pip install pyinstaller
          pip install --force-reinstall --no-binary charset-normalizer charset-normalizer

      - name: Build converter sidecar
        working-directory: python
        run: pyinstaller converter.spec

      - name: Copy sidecar to Tauri binaries
        run: |
          copy python\dist\converter.exe src-tauri\binaries\converter-x86_64-pc-windows-msvc.exe

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-windows
          path: src-tauri/binaries/converter-x86_64-pc-windows-msvc.exe

  build-tauri:
    needs: build-python-sidecar
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-windows
          path: src-tauri/binaries/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify signing key is set
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is NOT set!"
            exit 1
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY})"
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not set"
          else
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set (length: ${#TAURI_SIGNING_PRIVATE_KEY_PASSWORD})"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Sign installer if .sig not generated
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "=== NSIS output ==="
          ls -la src-tauri/target/release/bundle/nsis/

          SETUP_EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
          echo "Setup exe: $SETUP_EXE"

          if [ ! -f "${SETUP_EXE}.sig" ]; then
            echo "No .sig file found, signing manually..."
            printf '%s' "$SIGNING_KEY" > /tmp/signing.key
            npx tauri signer sign --private-key-path /tmp/signing.key --password "$SIGNING_PASSWORD" "$SETUP_EXE"
            rm -f /tmp/signing.key
          else
            echo ".sig file already exists"
          fi

          echo "=== Files after signing ==="
          ls -la src-tauri/target/release/bundle/nsis/

      - name: Rename installer to remove spaces
        shell: bash
        run: |
          SETUP_EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
          SETUP_SIG="${SETUP_EXE}.sig"
          SAFE_NAME=$(basename "$SETUP_EXE" | sed 's/ /-/g')
          NSIS_DIR=$(dirname "$SETUP_EXE")

          echo "Original: $(basename "$SETUP_EXE")"
          echo "Renamed:  $SAFE_NAME"

          mv "$SETUP_EXE" "$NSIS_DIR/$SAFE_NAME"
          [ -f "$SETUP_SIG" ] && mv "$SETUP_SIG" "$NSIS_DIR/${SAFE_NAME}.sig"

          ls -la "$NSIS_DIR/"

      - name: Create release and upload assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          SETUP_EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)

          echo "Setup exe: $SETUP_EXE"

          gh release create "$TAG" \
            --title "Thai PDF Fixer $TAG" \
            --notes $'ดาวน์โหลดตัวติดตั้ง:\n- `.exe` — ตัวติดตั้งแบบ NSIS\n\nหากใช้งานอยู่แล้ว แอปจะแจ้งเตือนอัปเดตอัตโนมัติ' \
            || echo "Release already exists, uploading assets..."

          [ -n "$SETUP_EXE" ] && gh release upload "$TAG" "$SETUP_EXE" --clobber

      - name: Generate and upload latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SETUP_EXE_NAME=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" -exec basename {} \; | head -1)
          SETUP_SIG=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe.sig" | head -1)

          if [ -z "$SETUP_SIG" ]; then
            echo "::error::No .sig file found! Cannot create latest.json"
            exit 1
          fi

          SIGNATURE=$(cat "$SETUP_SIG")
          DOWNLOAD_URL="https://github.com/SatangBudsai/thai-pdf-fixer-for-the-blind/releases/download/${TAG}/${SETUP_EXE_NAME}"

          printf '{\n  "version": "%s",\n  "notes": "Thai PDF Fixer %s",\n  "pub_date": "%s",\n  "platforms": {\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "%s"\n    }\n  }\n}\n' \
            "$VERSION" "$TAG" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$SIGNATURE" "$DOWNLOAD_URL" > latest.json

          echo "=== latest.json ==="
          cat latest.json
          gh release upload "$TAG" latest.json --clobber
